<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Responsive: covers all devices, prevents user zoom -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Device Integrity</title>

    <!-- PWA / mobile app feel -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#f8f9ff" />

    <meta name="robots" content="noindex, nofollow" />

    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        /* Disable pull-to-refresh on Android Chrome & iOS Safari overscroll */
        overscroll-behavior: none;
        /* Prevent iOS text size inflation */
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
        /* Disable tap highlight flash on mobile */
        -webkit-tap-highlight-color: transparent;
      }
      #root {
        height: 100%;
        /* Safe area insets for notch / home-bar on iOS */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
